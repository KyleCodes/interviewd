# interviewd edge gateway: nginx in front of N scaled `api` replicas.
# Load balancing is delegated to Docker's embedded DNS, which round-robins
# A-records across replica IPs. See resolver/variable notes in http{} below.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS. valid=5s forces re-resolution so replicas added
    # or removed by the autoscaler are picked up within seconds. A static
    # proxy_pass would resolve once at startup and freeze the IP list.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # JSON access log -> stdout -> promtail -> Loki. request_time gives
    # edge-observed latency including upstream + network.
    log_format json_access escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"request_time":$request_time'
        '}';

    access_log /dev/stdout json_access;
    error_log  /dev/stderr warn;

    server {
        listen 8080;

        # Gateway self-health, answered locally — must not depend on upstream
        # so orchestration can distinguish "gateway down" from "api down".
        location /gw-healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok";
        }

        location / {
            # Using a variable defers DNS resolution to request time (honoring
            # the resolver's 5s TTL) instead of pinning IPs at config load.
            set $upstream http://api:8000;
            proxy_pass $upstream;

            proxy_http_version 1.1;
            # No upstream keepalive: fresh connections spread load evenly
            # across freshly-resolved replica IPs.
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Fail fast on dead replicas; allow slow scoring endpoints to finish.
            proxy_connect_timeout 2s;
            proxy_read_timeout    30s;
            proxy_send_timeout    30s;
        }
    }
}
