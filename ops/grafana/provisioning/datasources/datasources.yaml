apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 5s

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  # Backup: ad-hoc SQL against the queue/results during a live demo.
  - name: Postgres
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: interviewd
    editable: false
    jsonData:
      database: interviewd
      sslmode: disable
    secureJsonData:
      password: dev
